name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3-pip python3-dev \
            ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev \
            libavcodec-dev zlib1g-dev libgstreamer1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            openjdk-11-jdk unzip zip
          pip3 install --upgrade pip
          pip3 install buildozer cython==0.29.36

      - name: Build with Buildozer
        run: |
          yes | buildozer -v android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 1
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twse-app-debug
          path: bin/*.apk
          if-no-files-found: error
